services:
  - type: web
    name: medical-cv-hackathon
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_SUMMARIES_ENABLED
        value: "true"
